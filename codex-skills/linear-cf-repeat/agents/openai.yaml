interface:
  display_name: "Linear CF Repeat"
  short_description: "Spin out the next ChangeFlow"
  default_prompt: "Use $linear-cf-repeat to create the next sibling ChangeFlow issue from an evaluated flow in Planning, not Backlog."

dependencies:
  tools:
    - type: "mcp"
      value: "linear"
      description: "Linear MCP server"
      transport: "streamable_http"
      url: "https://mcp.linear.app/mcp"

policy:
  allow_implicit_invocation: true
